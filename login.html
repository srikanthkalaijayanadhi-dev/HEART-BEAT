<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HEARTBEAT Admin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    
    <div class="login-card">
        <a href="index.html" class="logo login-logo">
            HEART<span class="heart-pulse">❤️</span>BEAT
        </a>
        <h1 class="login-title">Admin Access</h1>
        <p class="login-subtitle">Please enter your credentials to continue.</p>

        <div id="error-msg" class="error-msg">Invalid email or password.</div>

        <form id="login-form" class="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="heartbeat@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary login-btn">
                <span>🔒</span> Login to Dashboard
            </button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        // Redirect if already logged in
        if (auth.isLoggedIn()) {
            window.location.href = 'admin.html';
        }

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (auth.login(email, password)) {
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
                // Reset form slightly for security feel
                document.getElementById('password').value = '';
            }
        });
    </script>
</body>
</html>
