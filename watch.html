    <!-- Ad Script -->
    <script>
      (function(i,n,p,a,g,e){

        var q=n.createElement('script'); q.async=1;
        q.src='//static.qualiclicks.com/inpage/inpage.js';
        s.appendChild(q);
        i.inpagepush('init', {
          host: 'xml.qualiclicks.com',
          feed: 1193313,
          auth : '1Th6',
          subid: '',

      })(window, document);
    </script>
    <!-- Video Ad Script (Prebid/Ezmob) -->
    <script type="text/javascript" src="https://docdn.ezmob.com/prebid.js" async></script>
    <script>
        var pbjs = pbjs || {};
        pbjs.que = pbjs.que || [];
        
        pbjs.que.push(function() {
            var adUnits = [{
                code: 'container-1',
                mediaTypes: {
                    video: {
                        context: 'outstream',
                        playerSize: [300, 250],
                        renderer: {
                            url: 'https://docdn.ezmob.com/outstream_pb.js',
                            render: renderOutstream
                        }
                    }
                },
                bids: [{
                    bidder: 'adkernel',
                    params: {
                      zoneId: 351925,
                      host: 'cpm.ezmob.com'
                    }
                }]
            }];
            pbjs.addAdUnits(adUnits);
            pbjs.requestBids({
                bidsBackHandler: function(bidResponses) {
                    process('container-1');
                }
            });
        });

        function process(adUnit) {
            var bidResponses = pbjs.getHighestCpmBids(adUnit);
            if (bidResponses.length == 0) return;
            var bid = bidResponses[0];
            pbjs.renderAd(document, bid.adId);
        }
        
        function renderOutstream(bid) {
            OutstreamPlayerPB(bid, {
                displayMode: 'floating',
                transitions: true,
                vpaidMode: 2
            });
        }
    </script>
</head>
<body class="admin-body">
    <!-- Watch Backdrop -->
    <div id="watch-backdrop" class="watch-backdrop"></div>

    <!-- Navigation Bar -->
    <nav class="navbar scrolled">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    HEART<span class="heart-pulse">❤️</span>BEAT
                </a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Movies</a></li>
                    <li><a href="#">Series</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <a href="index.html" class="btn btn-secondary">
                    <span class="btn-icon">⬅️</span>
                    <span class="btn-text">← Back</span>
                </a>
            </div>
        </div>
    </nav>

    <main id="watch-content" class="container">
        <div class="watch-container">
            <div class="watch-poster">
                <img id="watch-poster-img" src="" alt="Poster">
            </div>

            <div class="watch-info">
                <h1 id="watch-title" class="watch-title">Loading...</h1>
                <div class="modal-meta watch-meta">
                    <span class="badge">4K Ultra HD</span>
                    <span id="watch-date" class="publish-date">Published: ...</span>
                    <span id="watch-category" class="badge">Category</span>
                </div>
                
                <div class="watch-actions">
                    <button id="watch-now-btn" class="btn btn-primary btn-large">▶ Watch Now</button>
                    <button class="btn btn-secondary btn-large">+ Add to List</button>
                </div>

                <div class="watch-about-section">
                    <h3 class="watch-about-title">About Series</h3>
                    <p id="watch-desc" class="watch-desc">
                        Loading description...
                    </p>
                </div>

                <!-- Episodes Section -->
                <div id="episodes-section" class="hidden-initial mt-3">
                    <h3 class="watch-about-title">Episodes</h3>
                    <div id="episodes-grid" class="episodes-grid">
                        <!-- Dynamic episodes -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Sponsored Video Ad -->
        <div class="ad-billing-area mt-4">
            <div id="container-1"></div>
        </div>

        <!-- Medium Rectangle Ad (300x250) -->
        <div class="ad-billing-area">
            <SCRIPT TYPE="text/javascript">
                var __jscp=function(){for(var b=0,a=window;a!=a.parent;)++b,a=a.parent;if(a=window.parent==window?document.URL:document.referrer){var c=a.indexOf("://");0<=c&&(a=a.substring(c+3));c=a.indexOf("/");0<=c&&(a=a.substring(0,c))}var b={pu:a,"if":b,rn:new Number(Math.floor(99999999*Math.random())+1)},a=[],d;for(d in b)a.push(d+"="+encodeURIComponent(b[d]));return encodeURIComponent(a.join("&"))};
                document.write('<S' + 'CRIPT TYPE="text/javascript" SRC="//cpm.ezmob.com/tag?zone_id=351927&size=300x250&subid=&j=' + __jscp() + '"></S' + 'CRIPT>');
            </SCRIPT>
        </div>

        <!-- Recommendations Section -->
        <section class="recommendations-section">
            <h2 class="row-title">Recommended for You</h2>
            <div id="recommendations-container" class="row-cards">
                <!-- Recommendations will be injected here -->
            </div>
        </section>
    </main>

    <!-- Bottom Leaderboard Ad (728x90) -->
    <div class="ad-billing-area">
        <SCRIPT TYPE="text/javascript">
            var __jscp=function(){for(var b=0,a=window;a!=a.parent;)++b,a=a.parent;if(a=window.parent==window?document.URL:document.referrer){var c=a.indexOf("://");0<=c&&(a=a.substring(c+3));c=a.indexOf("/");0<=c&&(a=a.substring(0,c))}var b={pu:a,"if":b,rn:new Number(Math.floor(99999999*Math.random())+1)},a=[],d;for(d in b)a.push(d+"="+encodeURIComponent(b[d]));return encodeURIComponent(a.join("&"))};
            document.write('<S' + 'CRIPT TYPE="text/javascript" SRC="//cpm.ezmob.com/tag?zone_id=351928&size=728x90&subid=&j=' + __jscp() + '"></S' + 'CRIPT>');
        </SCRIPT>
    </div>

    <!-- Footer -->
    <footer class="footer footer-container watch-footer">
        <p>&copy; 2026 HEARTBEAT Premium. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        // Specific logic for Watch Page
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const item = app.content.find(i => i.id === id);

            if (item) {
                document.title = `${item.title} | HEARTBEAT`;
                document.getElementById('watch-backdrop').style.backgroundImage = `url('${item.thumbLandscape}')`;
                document.getElementById('watch-poster-img').src = item.thumbPortrait;
                document.getElementById('watch-title').textContent = item.title;
                document.getElementById('watch-desc').textContent = item.desc;
                document.getElementById('watch-category').textContent = item.category;
                
                const date = new Date(item.publishDate).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                document.getElementById('watch-date').textContent = `Published: ${date}`;

                // Watch Now Button
                const watchBtn = document.getElementById('watch-now-btn');
                if (item.type === 'Series') {
                    watchBtn.textContent = '📜 View Episodes';
                    watchBtn.onclick = () => {
                        document.getElementById('episodes-section').scrollIntoView({ behavior: 'smooth' });
                    };
                    
                    // Render Episodes
                    const epSection = document.getElementById('episodes-section');
                    const epGrid = document.getElementById('episodes-grid');
                    if (item.episodes && item.episodes.length > 0) {
                        epSection.style.display = 'block';
                        epGrid.innerHTML = item.episodes.map((ep, index) => `
                            <a href="${ep.link}" target="_blank" class="episode-card">
                                <div class="episode-info">
                                    <h4>${ep.title}</h4>
                                    <p>Episode ${index + 1}</p>
                                </div>
                                <div class="ep-play-btn">▶</div>
                            </a>
                        `).join('');
                    }
                } else {
                    watchBtn.onclick = () => {
                        if (item.videoLink) window.open(item.videoLink, '_blank');
                        else alert('Streaming link not available yet.');
                    };
                }

                // Render Recommendations
                const recommendations = app.content.filter(i => i.category === item.category && i.id !== item.id);
                const recContainer = document.getElementById('recommendations-container');
                if (recommendations.length > 0) {
                    recContainer.innerHTML = recommendations.map(rec => `
                        <article class="card" data-id="${rec.id}">
                            <img class="card-thumb" src="${rec.thumbPortrait}" alt="${rec.title}" loading="lazy">
                            <div class="card-overlay">
                                <span class="play-icon">▶</span>
                            </div>
                            <div class="card-info">
                                <h3 class="card-title">${rec.title}</h3>
                                <div class="card-meta">
                                    <span>HD</span>
                                    <span>${new Date(rec.publishDate).getFullYear()}</span>
                                </div>
                            </div>
                        </article>
                    `).join('');
                } else {
                    recContainer.innerHTML = '<p class="loading-status">Check back later for more content in this category.</p>';
                }

            } else {
                document.getElementById('watch-title').textContent = "Content Not Found";
            }
        });
    </script>
</body>
</html>
